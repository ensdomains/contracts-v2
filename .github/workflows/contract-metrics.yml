name: Contract Metrics

on:
  pull_request:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: contract-metrics-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  contract-metrics:
    name: Contract Metrics
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout base
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base
          submodules: recursive
          fetch-depth: 0

      - name: Checkout head
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: head
          submodules: recursive
          fetch-depth: 0

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: head/.nvmrc

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: head/.bun-version

      - name: Install base dependencies
        run: cd base && bun install --frozen-lockfile

      - name: Install head dependencies
        run: cd head && bun install --frozen-lockfile

      - name: Collect base metrics
        run: cd base/contracts && bun run metrics
        env:
          GAS_METRICS: "1"
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Collect head metrics
        run: cd head/contracts && bun run metrics
        env:
          GAS_METRICS: "1"
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Compare metrics
        id: compare
        continue-on-error: true
        run: |
          cd head/contracts
          bun ./script/metrics/compare.ts \
            --base ../../base/contracts/metrics/contract-metrics.json \
            --head metrics/contract-metrics.json \
            --out metrics/contract-metrics-diff.json \
            --markdown metrics/contract-metrics.md

      - name: Upload metrics artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-metrics-${{ github.event.pull_request.number }}
          path: |
            base/contracts/metrics/*.json
            head/contracts/metrics/*.json
            head/contracts/metrics/*.md

      - name: Upsert PR comment
        uses: actions/github-script@v7
        if: always()
        continue-on-error: true
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- ens-contract-metrics -->";
            const body = fs.readFileSync(
              "head/contracts/metrics/contract-metrics.md",
              "utf8",
            );
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 },
            );
            const existing = comments.find((comment) =>
              comment.body?.includes(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Enforce hard limits
        if: steps.compare.outcome == 'failure'
        run: exit 1
