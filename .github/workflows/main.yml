name: CI

"on":
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  check-types:
    name: Check Types
    runs-on: ubuntu-latest
    steps:
      # setup
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - name: Compile and check types
        run: cd contracts && bun compile:hardhat && bun check:types
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Check Docker runtime imports
        shell: bash
        run: |
          set -euo pipefail

          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          mkdir -p "$tmp/contracts/generated"
          cp package.json bun.lock "$tmp/"
          cp contracts/package.json contracts/rocketh.ts "$tmp/contracts/"
          printf 'export default {};\n' > "$tmp/contracts/generated/artifacts.ts"

          cd "$tmp"
          bun install --production --frozen-lockfile
          cd contracts
          bun --eval "await import('./rocketh.ts')"

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      # setup
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - name: Run E2E tests
        run: |
          cd contracts && \
          bun run test:e2e

  forge-tests:
    name: Forge Tests
    runs-on: ubuntu-latest
    steps:
      # setup
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - uses: awalsh128/cache-apt-pkgs-action@v1.5.3
        with:
          packages: lcov
          version: 1.0

      - name: Run forge tests
        run: |
          cd contracts && \
          bun run coverage:forge && \
          bun run coverage:reports

      - name: Upload coverage
        run: cd contracts && bun run coverage:upload
        env:
          CC_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          CC_GIT_SERVICE: github
          CC_SHA: ${{ github.sha }}

  hardhat-tests:
    name: Hardhat Tests
    runs-on: ubuntu-latest
    steps:
      # setup
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - uses: awalsh128/cache-apt-pkgs-action@v1.5.3
        with:
          packages: lcov
          version: 1.0

      - name: Run hardhat tests
        run: |
          cd contracts && \
          mkdir -p coverage/ && \
          bun run coverage:hardhat && \
          bun run coverage:reports

      - name: Upload coverage
        run: cd contracts && bun run coverage:upload
        env:
          CC_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          CC_GIT_SERVICE: github
          CC_SHA: ${{ github.sha }}

  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      # setup
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - name: Lint
        run: bun --filter contracts lint

      - name: Format
        run: bun --filter contracts format:check

  publish-docker:
    name: Publish Docker Image
    needs: [check-types, e2e-tests, forge-tests, hardhat-tests, lint]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/publish-docker.yml
