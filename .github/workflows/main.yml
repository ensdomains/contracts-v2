name: CI

"on":
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  check-types:
    name: Check Types
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      # setup
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - name: Compile and check types
        run: cd contracts && bun compile:hardhat && bun check:types
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Check Docker runtime imports
        shell: bash
        run: |
          set -euo pipefail

          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          mkdir -p "$tmp/contracts/generated"
          cp package.json bun.lock "$tmp/"
          cp contracts/package.json contracts/rocketh.ts "$tmp/contracts/"
          printf 'export default {};\n' > "$tmp/contracts/generated/artifacts.ts"

          cd "$tmp"
          bun install --production --frozen-lockfile
          cd contracts
          bun --eval "await import('./rocketh.ts')"

  e2e-tests:
    name: E2E Tests
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      # setup
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - name: Run E2E tests
        run: |
          cd contracts && \
          bun run test:e2e

  forge-tests:
    name: Forge Tests
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      # setup
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - uses: awalsh128/cache-apt-pkgs-action@v1.5.3
        with:
          packages: lcov
          version: 1.0

      - name: Run forge tests
        run: |
          cd contracts && \
          bun run coverage:forge && \
          bun run coverage:reports

      - name: Upload coverage
        run: cd contracts && bun run coverage:upload
        env:
          CC_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          CC_GIT_SERVICE: github
          CC_SHA: ${{ github.sha }}

  hardhat-tests:
    name: Hardhat Tests
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      # setup
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - uses: awalsh128/cache-apt-pkgs-action@v1.5.3
        with:
          packages: lcov
          version: 1.0

      - name: Run hardhat tests
        run: |
          cd contracts && \
          mkdir -p coverage/ && \
          bun run coverage:hardhat && \
          bun run coverage:reports

      - name: Upload coverage
        run: cd contracts && bun run coverage:upload
        env:
          CC_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          CC_GIT_SERVICE: github
          CC_SHA: ${{ github.sha }}

  lint:
    name: Lint and Format
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      # setup
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - name: Lint
        run: bun --filter contracts lint

      - name: Format
        run: bun --filter contracts format:check

  publish-docker:
    name: Build Docker Image (${{ matrix.platform }})
    needs: [check-types, e2e-tests, forge-tests, hardhat-tests, lint]
    if: |
      always() &&
      (
        (
          github.ref == 'refs/heads/main' &&
          needs.check-types.result == 'success' &&
          needs.e2e-tests.result == 'success' &&
          needs.forge-tests.result == 'success' &&
          needs.hardhat-tests.result == 'success' &&
          needs.lint.result == 'success'
        ) ||
        (github.event_name == 'workflow_dispatch' && github.ref_type == 'branch')
      )
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            artifact: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact: linux-arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: "recursive"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Github Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get branch name and short SHA for tagging
        id: branch
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BRANCH_NAME="$HEAD_REF"
            SOURCE_SHA="$PR_HEAD_SHA"
          else
            BRANCH_NAME="$REF_NAME"
            SOURCE_SHA="$GITHUB_SHA_VALUE"
          fi

          SHORT_SHA=$(printf '%s' "$SOURCE_SHA" | cut -c1-7)
          DOCKER_TAG=$(printf '%s' "$BRANCH_NAME" | sed -E 's/[^A-Za-z0-9_.-]+/-/g; s/^[.-]+//; s/[.-]+$//')

          if [ -z "$DOCKER_TAG" ]; then
            DOCKER_TAG="branch"
          fi

          DOCKER_TAG=$(printf '%s' "$DOCKER_TAG" | cut -c1-128)
          DOCKER_TAG_PREFIX=$(printf '%s' "$DOCKER_TAG" | cut -c1-120)

          echo "tag=$DOCKER_TAG" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$DOCKER_TAG_PREFIX-$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.branch.outputs.sha_tag }}
            type=raw,value=${{ steps.branch.outputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.ref_type == 'branch' && github.ref != 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          build-args: GITHUB_SHA=${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-${{ matrix.artifact }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.artifact }}

      - name: Export digest
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.artifact }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-docker-manifest:
    name: Publish Docker Manifest
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.ref_type == 'branch')
    needs: [publish-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Github Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get branch name and short SHA for tagging
        id: branch
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BRANCH_NAME="$HEAD_REF"
            SOURCE_SHA="$PR_HEAD_SHA"
          else
            BRANCH_NAME="$REF_NAME"
            SOURCE_SHA="$GITHUB_SHA_VALUE"
          fi

          SHORT_SHA=$(printf '%s' "$SOURCE_SHA" | cut -c1-7)
          DOCKER_TAG=$(printf '%s' "$BRANCH_NAME" | sed -E 's/[^A-Za-z0-9_.-]+/-/g; s/^[.-]+//; s/[.-]+$//')

          if [ -z "$DOCKER_TAG" ]; then
            DOCKER_TAG="branch"
          fi

          DOCKER_TAG=$(printf '%s' "$DOCKER_TAG" | cut -c1-128)
          DOCKER_TAG_PREFIX=$(printf '%s' "$DOCKER_TAG" | cut -c1-120)

          echo "tag=$DOCKER_TAG" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$DOCKER_TAG_PREFIX-$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.branch.outputs.sha_tag }}
            type=raw,value=${{ steps.branch.outputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.ref_type == 'branch' && github.ref != 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Create and push manifest
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
          REGISTRY_IMAGE: ghcr.io/${{ github.repository }}
        run: |
          cd "${RUNNER_TEMP}/digests"
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(for digest in *; do printf '%s@sha256:%s ' "$REGISTRY_IMAGE" "$digest"; done)
